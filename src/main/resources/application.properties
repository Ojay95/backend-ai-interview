# ===============================
# Server Configuration
# ===============================
server.port=8080

# ===============================
# Application Name
# ===============================
spring.application.name=ai_interview

# ===============================
# Database Configuration (PostgreSQL)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


# Hibernate / JPA
# Use 'validate' or 'none' in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Redis Configuration (For Rate Limiting)
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===============================
# AI Configuration (Gemini)
# ===============================
# Set GEMINI_API_KEY in your IDE environment variables or OS
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash
spring.ai.google.genai.chat.options.temperature=0.7


# ===============================
# Email Configuration (SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dev.aiinterview@gmail.com
spring.mail.password=xtgf dhtu nhze vaji
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

