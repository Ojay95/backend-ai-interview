

# ===============================
# Server Configuration
# ===============================
server.port=8080

# ===============================
# Application Name
# ===============================
spring.application.name=ai_interview

# ===============================
# Database Configuration (PostgreSQL)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


# Hibernate / JPA
# Use 'validate' or 'none' in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Redis Configuration (For Rate Limiting)
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===============================
# AI Configuration (Gemini)
# ===============================
# Set GEMINI_API_KEY in your IDE environment variables or OS
spring.ai.google.gemini.api-key=${GEMINI_API_KEY}
spring.ai.google.gemini.chat.options.model=gemini-pro
spring.ai.google.gemini.chat.options.temperature=0.7

# ===============================
# Custom JWT Configuration
# ===============================
# 256-bit Hex encoded secret key
app.jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
# Token expiration in milliseconds (24 hours)
app.jwt.expiration-ms=86400000